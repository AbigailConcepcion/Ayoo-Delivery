<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ayoo Delivery</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#8B5CF6" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ayoo-purple-dark: #6d28d9;
      --ayoo-purple: #8b5cf6;
      --ayoo-purple-light: #c4b5fd;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(180deg, #f8f5ff 0%, #efe7ff 48%, #e6dbff 100%);
      color: #1f1235;
      -webkit-tap-highlight-color: transparent;
    }

    .ayoo-gradient {
      background: linear-gradient(135deg, var(--ayoo-purple-dark) 0%, var(--ayoo-purple) 48%, var(--ayoo-purple-light) 100%);
    }

    .pill-shadow {
      box-shadow: 0 16px 35px rgba(109, 40, 217, 0.22);
    }

    .card-shadow {
      box-shadow: 0 18px 45px rgba(109, 40, 217, 0.14);
    }

    .input-label-border {
      position: relative;
    }

    .input-label-border label {
      position: absolute;
      top: -10px;
      left: 12px;
      background: white;
      padding: 0 4px;
      font-size: 12px;
      font-weight: 700;
      color: #7c3aed;
      z-index: 10;
    }

    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }

    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@^19.2.4",
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
        "react/": "https://esm.sh/react@^19.2.4/",
        "@google/genai": "https://esm.sh/@google/genai@^1.39.0"
      }
    }
  </script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <link rel="stylesheet" href="/index.css">
</head>

<body class="m-0 p-0 overflow-x-hidden bg-transparent">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
